<img (dblclick)="onDoubleClick()" src="https://upload.wikimedia.org/wikipedia/commons/3/34/Red_star.svg"
height="42" width="42">
<!-- Displays an image that toggles visibility when double-clicked -->

<br>
<h2 [hidden] = "hide">Look at the Star. </h2>
<!-- This text is shown or hidden depending on the 'hide' boolean -->

<br>
<button (click)="onButtonClick()">Press me</button>
<p>The number of times the button has been pressed is {{count}}.</p>
<!-- Button increases the counter and displays the current count -->
